name: Release

on:
  push:
    tags: ['v*']
    branches: ['github-actions']
  workflow_dispatch:

jobs:
  build-macos:
    name: macOS (${{ matrix.target }})
    runs-on: macos-latest
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: macos-arm64
          # Uncomment to also build for Intel Mac:
          # - target: x86_64-apple-darwin
          #   artifact: macos-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          brew install icu4c freetype graphite2 libpng
          cargo install cargo-bundle --locked
          echo "PKG_CONFIG_PATH=$(brew --prefix icu4c)/lib/pkgconfig" >> $GITHUB_ENV

      - name: Derive version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0-dev.$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          fi

      - name: Bundle
        run: cargo bundle --package monocurl --release --target ${{ matrix.target }}
        env:
          MONOCURL_VERSION: ${{ steps.version.outputs.version }}

      - name: Post-bundle
        run: bash bundling/post-bundle-macos.sh "${{ steps.version.outputs.version }}" "${{ matrix.target }}"
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          CODESIGN_ENTITLEMENTS: bundling/templates/macos/Monocurl.entitlements.in
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monocurl-${{ matrix.artifact }}
          path: dist/macos/Monocurl-*.dmg

      - name: Upload to GitHub release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/macos/Monocurl-*.dmg

  # Uncomment and fill in when ready to add other platforms:
