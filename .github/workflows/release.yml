name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-macos:
    name: macOS (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            artifact: macos-arm64
            runner: macos-15
          - target: x86_64-apple-darwin
            artifact: macos-x86_64
            runner: macos-15-intel

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          brew install pkg-config icu4c freetype graphite2 libpng
          cargo install cargo-bundle --locked

          ICU_PREFIX="$(brew --prefix icu4c 2>/dev/null || true)"
          if [[ -z "$ICU_PREFIX" || ! -d "$ICU_PREFIX/lib/pkgconfig" ]]; then
            ICU_PREFIX="$(find "$(brew --prefix)/opt" -maxdepth 1 -name 'icu4c*' -print | sort | tail -n 1)"
          fi
          if [[ -z "$ICU_PREFIX" || ! -d "$ICU_PREFIX/lib/pkgconfig" ]]; then
            echo "could not find Homebrew icu4c pkg-config directory" >&2
            exit 1
          fi

          PKG_CONFIG_PATH="$ICU_PREFIX/lib/pkgconfig:$(brew --prefix freetype)/lib/pkgconfig:$(brew --prefix graphite2)/lib/pkgconfig:$(brew --prefix libpng)/lib/pkgconfig"
          export PKG_CONFIG_PATH
          {
            echo "PKG_CONFIG_PATH=$PKG_CONFIG_PATH"
            echo "CFLAGS=-Wno-int-conversion"
            echo "CXXFLAGS=-std=c++17"
            echo "MACOSX_DEPLOYMENT_TARGET=11.0"
          } >> $GITHUB_ENV
          pkg-config --modversion graphite2 freetype2 libpng icu-uc

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Apply bundle version
        run: perl -0pi -e 's/^version = "[^"]+"/version = "$ENV{MONOCURL_VERSION}"/m' crates/monocurl/Cargo.toml
        env:
          MONOCURL_VERSION: ${{ steps.version.outputs.version }}

      - name: Bundle
        run: cargo bundle --package monocurl --release --target ${{ matrix.target }}
        env:
          MONOCURL_VERSION: ${{ steps.version.outputs.version }}

      - name: Import macOS signing certificate
        run: |
          if [[ -z "${MACOS_CERTIFICATE_P12:-}" || -z "${MACOS_CERTIFICATE_PASSWORD:-}" ]]; then
            echo "Skipping certificate import; MACOS_CERTIFICATE_P12 or MACOS_CERTIFICATE_PASSWORD is not set."
            exit 0
          fi

          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/monocurl-signing.keychain-db"

          printf '%s' "$MACOS_CERTIFICATE_P12" | base64 -D > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" \
            -k "$KEYCHAIN_PATH" \
            -P "$MACOS_CERTIFICATE_PASSWORD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple:,codesign: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"
          security find-identity -v -p codesigning "$KEYCHAIN_PATH"
        env:
          MACOS_CERTIFICATE_P12: ${{ secrets.MACOS_CERTIFICATE_P12 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ github.run_id }}-${{ github.run_attempt }}

      - name: Post-bundle
        run: bash bundling/macos/post-bundle.sh "${{ steps.version.outputs.version }}" "${{ matrix.target }}"
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          CODESIGN_ENTITLEMENTS: bundling/macos/Monocurl.entitlements
          APPLE_NOTARY_APPLE_ID: ${{ secrets.APPLE_NOTARY_APPLE_ID }}
          APPLE_NOTARY_PASSWORD: ${{ secrets.APPLE_NOTARY_PASSWORD }}
          APPLE_NOTARY_TEAM_ID: ${{ secrets.APPLE_NOTARY_TEAM_ID }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monocurl-${{ matrix.artifact }}
          path: dist/macos/Monocurl-*.dmg

  build-linux:
    name: Linux (${{ matrix.target }})
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            artifact: linux-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libfreetype6-dev \
            libgraphite2-dev \
            libpng-dev \
            libvulkan-dev \
            libx11-dev \
            libxcb1-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libxkbcommon-x11-dev \
            libwayland-dev \
            libfontconfig1-dev \
            libssl-dev \
            libicu-dev \
            patchelf \
            pkg-config
          pkg-config --modversion graphite2 freetype2 libpng icu-uc fontconfig openssl

      - name: Derive version
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Apply bundle version
        run: perl -0pi -e 's/^version = "[^"]+"/version = "$ENV{MONOCURL_VERSION}"/m' crates/monocurl/Cargo.toml
        env:
          MONOCURL_VERSION: ${{ steps.version.outputs.version }}

      - name: Build
        run: cargo build --package monocurl --release --target ${{ matrix.target }}
        env:
          MONOCURL_VERSION: ${{ steps.version.outputs.version }}

      - name: Bundle
        run: bash bundling/linux/post-bundle.sh "${{ steps.version.outputs.version }}" "${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monocurl-${{ matrix.artifact }}
          path: dist/linux/

  build-windows:
    name: Windows (${{ matrix.target }})
    runs-on: windows-latest
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            artifact: windows-x86_64

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Cache vcpkg binary packages
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/vcpkg-binary-cache
          key: vcpkg-${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('.github/workflows/release.yml') }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ matrix.target }}-

      - name: Install build dependencies
        shell: pwsh
        run: |
          $vcpkgRoot = $env:VCPKG_INSTALLATION_ROOT
          if (-not $vcpkgRoot) {
            $vcpkgRoot = "C:\vcpkg"
          }

          if (-not (Test-Path "$vcpkgRoot\vcpkg.exe")) {
            throw "vcpkg.exe not found at $vcpkgRoot"
          }

          $vcpkgCache = "$env:GITHUB_WORKSPACE\vcpkg-binary-cache"
          New-Item -ItemType Directory -Force $vcpkgCache | Out-Null
          $env:VCPKG_BINARY_SOURCES = "clear;files,$vcpkgCache,readwrite"

          & "$vcpkgRoot\vcpkg.exe" install `
            --triplet x64-windows-static-md `
            icu `
            freetype `
            graphite2 `
            libpng `
            fontconfig

          $installed = & "$vcpkgRoot\vcpkg.exe" list --triplet x64-windows-static-md
          foreach ($package in @("icu", "freetype", "graphite2", "libpng", "fontconfig")) {
            if (-not ($installed -match "^$package`:")) {
              throw "vcpkg package $package was not installed for x64-windows-static-md"
            }
          }

          "VCPKG_ROOT=$vcpkgRoot" >> $env:GITHUB_ENV
          "VCPKGRS_TRIPLET=x64-windows-static-md" >> $env:GITHUB_ENV
          "TECTONIC_DEP_BACKEND=vcpkg" >> $env:GITHUB_ENV
          "CXXFLAGS=/std:c++17" >> $env:GITHUB_ENV
          "CXXFLAGS_x86_64_pc_windows_msvc=/std:c++17" >> $env:GITHUB_ENV

      - name: Derive version
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Apply bundle version
        shell: bash
        run: perl -0pi -e 's/^version = "[^"]+"/version = "$ENV{MONOCURL_VERSION}"/m' crates/monocurl/Cargo.toml
        env:
          MONOCURL_VERSION: ${{ steps.version.outputs.version }}

      - name: Build
        run: cargo build --package monocurl --release --target ${{ matrix.target }}
        env:
          MONOCURL_VERSION: ${{ steps.version.outputs.version }}

      - name: Post-bundle
        shell: pwsh
        run: ./bundling/windows/post-bundle.ps1 "${{ steps.version.outputs.version }}" "${{ matrix.target }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Monocurl-${{ matrix.artifact }}
          path: dist/windows/

  publish:
    name: Publish release
    needs: [build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: Monocurl ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
          make_latest: true
          fail_on_unmatched_files: true
          files: dist/*
